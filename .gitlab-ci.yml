stages:
    - deploy
    - publish
# Change pip's cache directory to be inside the project directory since we can
# only cache local items.
variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

# Pip's cache doesn't store the python packages
# https://pip.pypa.io/en/stable/reference/pip_install/#caching
#
# If you want to also cache the installed packages, you have to install
# them in a virtualenv and cache it as well.
cache:
  paths:
    - .cache/pip


deploy_opensankey:
  stage: deploy
  variables:
    NODE_ENV: "production"
    FOLDER: /home/ubuntu/dev_opensankey
    APP_NAME : dev_opensankey
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
      variables:                              
        FOLDER: /home/ubuntu/dev_opensankey
        APP_NAME : dev_opensankey
    - if: $CI_COMMIT_REF_NAME == "test"
      variables:
        FOLDER: "/home/ubuntu/test_opensankey"
        APP_NAME : "test_opensankey"
    - if: $CI_COMMIT_REF_NAME == "prod"
      variables:
        FOLDER: "/home/ubuntu/prod_opensankey"
        APP_NAME : "opensankey"
  tags:
    - dev
  environment:
    name: dev
    url: dev.opensankey.fr
  cache: 
    key: $CI_COMMIT_REF_SLUG-$CI_PROJECT_DIR
    paths:
      - $FOLDER/opensankey/opensankey/client/node_modules/
    policy: pull
  before_script:
    - sudo systemctl stop $APP_NAME || true
  after_script:
    - echo "$FOLDER"
    - cd "$FOLDER"
    - bash restart_site.sh
  script:
    - echo "$FOLDER"
    - cd "$FOLDER"
    - source dev_opensankey/bin/activate
    - bash update_build_opensankey.sh

PublishExercicesAFM:
  stage: publish
  variables:
    NODE_ENV: "production"
    FOLDER: /home/ubuntu/dev_opensankey
    APP_NAME : dev_opensankey
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
      variables:                              
        FOLDER: /home/ubuntu/dev_opensankey
        APP_NAME : dev_opensankey
    - if: $CI_COMMIT_REF_NAME == "test"
      variables:
        FOLDER: "/home/ubuntu/test_opensankey"
        APP_NAME : "test_opensankey"
    - if: $CI_COMMIT_REF_NAME == "prod"
      variables:
        FOLDER: "/home/ubuntu/prod_opensankey"
        APP_NAME : "prod_opensankey"
  tags:
    - dev
  environment:
    name: dev
    url: http://dev.open-sankey.fr/fm/userfiles/Exercices/AFM/artefacts/open-sankey_0.1.9.ExercicesAFM/index.html
  script:
    - cd $FOLDER/opensankey/opensankey/client
    - npm install
    - CI= npm run publish   --datapath="/home/ubuntu/MFAData/Exercices/AFM" --publish_name="ExercicesAFM"
    - CI= npm run build_zip --datapath="/home/ubuntu/MFAData/Exercices/AFM" --publish_name="ExercicesAFM"
    - CI= npm run unzip     --datapath="/home/ubuntu/MFAData/Exercices/AFM" --publish_name="ExercicesAFM"
  when: manual


# Étape de build
pages:
  image: node:18
  stage: deploy
  variables:
    GIT_SUBMODULE_STRATEGY: none  # Évite les problèmes de sous-modules SSH
  script:
    # === Récupération de la version depuis package.json ===
    - PACKAGE_JSON_PATH="$CI_PROJECT_DIR/opensankey/client/package.json"
    - |
      if [ ! -f "$PACKAGE_JSON_PATH" ]; then
        echo "[ERREUR] Le fichier package.json est introuvable à : $PACKAGE_JSON_PATH"
        exit 1
      fi
    - APP_VERSION=$(node -p "require('$PACKAGE_JSON_PATH').version")
    - |
      if [ -z "$APP_VERSION" ] || [ "$APP_VERSION" = "undefined" ]; then
        echo "[ERREUR] Impossible de lire la version depuis package.json"
        exit 1
      fi
    - echo "[INFO] Version détectée depuis package.json : $APP_VERSION"

    # === Vérification que le build existe ===
    - BUILD_DIR="$CI_PROJECT_DIR/opensankey/client/build"
    - |
      if [ ! -d "$BUILD_DIR" ]; then
        echo "[ERREUR] Le dossier build n'existe pas : $BUILD_DIR"
        echo "[INFO] Assurez-vous que le job 'build' s'est exécuté correctement."
        exit 1
      fi

    # === Chemins ===
    - JS_DIR="$BUILD_DIR/static/js"
    - CSS_DIR="$BUILD_DIR/static/css"
    - INDEX_FILE="$BUILD_DIR/index.html"
    - VERSION_DIR="$CI_PROJECT_DIR/public/$APP_VERSION"
    - LATEST_DIR="$CI_PROJECT_DIR/public/latest"

    # === Vérification des dossiers nécessaires ===
    - |
      if [ ! -d "$JS_DIR" ]; then
        echo "[ERREUR] Dossier JS introuvable : $JS_DIR"
        exit 1
      fi
      if [ ! -d "$CSS_DIR" ]; then
        echo "[ERREUR] Dossier CSS introuvable : $CSS_DIR"
        exit 1
      fi
      if [ ! -f "$INDEX_FILE" ]; then
        echo "[ERREUR] Fichier index.html introuvable : $INDEX_FILE"
        exit 1
      fi

    # === JS ===
    - |
      cd "$JS_DIR"
      js_found=false
      for f in main.*.js; do
        if [ -f "$f" ]; then
          cp "$f" "opensankey-v$APP_VERSION.js"
          echo "[INFO] JS renommé : $f → opensankey-v$APP_VERSION.js"
          sed -i "s|$f|opensankey-v$APP_VERSION.js|g" "$INDEX_FILE"
          js_found=true
        fi
      done
      if [ "$js_found" = false ]; then
        echo "[ATTENTION] Aucun fichier main.*.js trouvé"
      fi

    # === CSS ===
    - |
      cd "$CSS_DIR"
      css_found=false
      for f in main.*.css; do
        if [ -f "$f" ]; then
          cp "$f" "opensankey-v$APP_VERSION.css"
          echo "[INFO] CSS renommé : $f → opensankey-v$APP_VERSION.css"
          sed -i "s|$f|opensankey-v$APP_VERSION.css|g" "$INDEX_FILE"
          css_found=true
        fi
      done
      if [ "$css_found" = false ]; then
        echo "[ATTENTION] Aucun fichier main.*.css trouvé"
      fi

    # === Chemins relatifs pour GitLab Pages
    - sed -i 's|="/static/|="./static/|g' "$INDEX_FILE"
    - echo "[INFO] Chemins convertis en relatifs pour GitLab Pages"

    # === Préparation des dossiers versionnés
    - mkdir -p "$VERSION_DIR"
    - cp -r "$BUILD_DIR"/* "$VERSION_DIR"
    - echo '<meta http-equiv="refresh" content="0; url=/" />' > "$VERSION_DIR/404.html"
    - echo "[INFO] Version $APP_VERSION copiée vers : $VERSION_DIR"

    # === Copier aussi vers /latest ===
    - rm -rf "$LATEST_DIR"
    - cp -r "$VERSION_DIR" "$LATEST_DIR"
    - echo '<meta http-equiv="refresh" content="0; url=/" />' > "$LATEST_DIR/404.html"
    - echo "[INFO] Version latest mise à jour"

    # === Création de la page d'index pour GitLab Pages ===
    - |
      cat > "$CI_PROJECT_DIR/public/index.html" << EOF
      <!DOCTYPE html>
      <html>
      <head>
          <title>OpenSankey - Versions</title>
          <style>
              body { font-family: Arial, sans-serif; margin: 40px; }
              h1 { color: #333; }
              a { display: block; margin: 10px 0; padding: 10px; background: #f5f5f5; text-decoration: none; color: #333; border-radius: 4px; }
              a:hover { background: #e0e0e0; }
          </style>
      </head>
      <body>
          <h1>OpenSankey - Versions disponibles</h1>
          <a href="./latest/">🚀 Dernière version (latest)</a>
          <a href="./$APP_VERSION/">📦 Version $APP_VERSION</a>
      </body>
      </html>
      EOF

    - echo "[INFO] Page d'index créée avec les liens vers les versions"
    - echo "[INFO] Déploiement terminé pour la version $APP_VERSION"

  artifacts:
    paths:
      - public
  dependencies:
    - build
  rules:
    - when: manual
      allow_failure: false
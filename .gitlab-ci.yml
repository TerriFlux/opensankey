  before_script:
    - sudo systemctl stop opensankey || true
  script:
    - cd /home/ubuntu/prod_opensankey
    - source prod_opensankey/bin/activate
    - cd opensankey
    - git pull
    - git checkout opensankey/server/views.py
    - cd opensankey/client
    - npm install
    - sudo npm link /home/ubuntu/terriflux/su-model-sankey/sankeytools/client/node_modules/react
    - CI= npm run build
    - sed -i -e 's/\/static\//\/static\/opensankey\//g' ./build/index.html
    - CI= sudo npm run dist
    - sudo npm link .
    - mv node_modules ../../..
    - cd ../..
    - pip install .
    - source ../../terriflux/terrifluxenv/bin/activate

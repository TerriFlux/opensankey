stages:
    - build
    - test
    - deploy

# Pip's cache doesn't store the python packages
# https://pip.pypa.io/en/stable/reference/pip_install/#caching
#
# If you want to also cache the installed packages, you have to install
# them in a virtualenv and cache it as well.
cache:
  paths:
    - .cache/pip

# Change pip's cache directory to be inside the project directory since we can
# only cache local items.
variables:
  GIT_SUBMODULE_STRATEGY: recursive
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  TESTS_DIR: /home/ubuntu/Tests
  PUBLIC_URL: "/"

build:
  stage: build
  tags:
    - dev, prod, test
  script:
    # Env
    - echo $CI_PROJECT_DIR
    - source /home/gitlab-runner/gitlab_dev/bin/activate
    # Build open-sankey
    - bash build_client.sh -I -L -B -D
    - bash build_server.sh
    - bash build_doc.sh
  except:
    - schedules

test:
  stage: test
  tags:
    - dev, prod, test
  script:
    # Env
    - echo $CI_PROJECT_DIR
    - echo $EIGEN_INCLUDE
    - echo $TESTS_DIR
    - source /home/gitlab-runner/gitlab_dev/bin/activate
    # Test
    - bash test.sh
  dependencies:
    - build

image: node:18

# Étape de build
build-react:
  stage: build
  script:
    - npm install
    - npm run build
    - mv build public
    - echo '<meta http-equiv="refresh" content="0; url=/" />' > public/404.html  # fallback pour React Router
  artifacts:
    paths:
      - public
  only:
    - tags
  rules:
    - if: '$CI_COMMIT_TAG == "prod"'
stages:
    - build
    - test

# Pip's cache doesn't store the python packages
# https://pip.pypa.io/en/stable/reference/pip_install/#caching
#
# If you want to also cache the installed packages, you have to install
# them in a virtualenv and cache it as well.
cache:
  paths:
    - .cache/pip

# Change pip's cache directory to be inside the project directory since we can
# only cache local items.
variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  EIGEN_INCLUDE: /home/ubuntu/dev_opensankey/sankeysuitemanager/eigen
  TESTS_DIR: /home/ubuntu/dev_opensankey/Tests
  SankeyExcelParser: /home/ubuntu/dev_opensankey/SankeyExcelParser

build:
  stage: build
  tags:
    - dev, prod, test
  script:
    - echo $CI_PROJECT_DIR
    - echo $EIGEN_INCLUDE
    - echo $TESTS_DIR
    - echo $SankeyExcelParser
    - source /home/gitlab-runner/gitlab_dev/bin/activate
    - pip install $SankeyExcelParser
    - bash build_client.sh
    - bash build_server.sh
    - bash build_doc.sh
  except:
    - schedules

test:
  stage: test
  tags:
    - dev, prod, test
  script:
    - echo $CI_PROJECT_DIR
    - echo $EIGEN_INCLUDE
    - echo $TESTS_DIR
    - source /home/gitlab-runner/gitlab_dev/bin/activate
    - bash test.sh
  dependencies:
    - build

stages:
    - build
    - test
    - deploy
# Pip's cache doesn't store the python packages
# https://pip.pypa.io/en/stable/reference/pip_install/#caching
#
# If you want to also cache the installed packages, you have to install
# them in a virtualenv and cache it as well.
cache:
  paths:
    - .cache/pip
# Change pip's cache directory to be inside the project directory since we can
# only cache local items.
variables:
  GIT_SUBMODULE_STRATEGY: recursive
  GIT_SUBMODULE_FORCE_HTTPS: "true"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PIP_QUIET: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_PROGRESS_BAR: "off"
  PIP_ROOT_USER_ACTION: "ignore"
  TESTS_DIR: /home/ubuntu/Tests
  PUBLIC_URL: "/"
build:
  stage: build
  tags:
    - dev, prod, test
  script:
    # Env
    - echo $CI_PROJECT_DIR
    - source /home/gitlab-runner/gitlab_dev/bin/activate
    # Build open-sankey
    - bash build_client.sh -I -L -B -D
    - bash build_server.sh
    - bash build_doc.sh
  artifacts:
    paths:
      - opensankey/client/build  # c'est le dossier généré par `npm run build`
  except:
    - schedules

test:
  stage: test
  tags:
    - dev, prod, test
  script:
    # Env
    - echo $CI_PROJECT_DIR
    - echo $EIGEN_INCLUDE
    - echo $TESTS_DIR
    - source /home/gitlab-runner/gitlab_dev/bin/activate
    # Test
    - bash test.sh
  dependencies:
    - build
  rules:
    - if: '$CI_COMMIT_TAG == "prod"'
      when: never
    - when: always

# =====================================================================
# Déploiement versionné (parallel deployments — GitLab >= 16.7)
# Chaque version est publiée sous /<APP_VERSION>/ et conservée par GitLab
# indépendamment des autres. Pas d'écrasement des versions précédentes.
# Quota par défaut : 100 déploiements parallèles par projet
# (configurable dans Settings → Pages).
# Doc : https://docs.gitlab.com/user/project/pages/#parallel-deployments
# =====================================================================
pages:
  image: node:18
  stage: deploy
  variables:
    GIT_SUBMODULE_STRATEGY: none  # Évite les problèmes de sous-modules SSH
  pages:
    path_prefix: "$APP_VERSION"
  script:
    # === Récupération de la version depuis package.json ===
    - PACKAGE_JSON_PATH="$CI_PROJECT_DIR/opensankey/client/package.json"
    - |
      if [ ! -f "$PACKAGE_JSON_PATH" ]; then
        echo "[ERREUR] Le fichier package.json est introuvable à : $PACKAGE_JSON_PATH"
        exit 1
      fi
    - APP_VERSION=$(node -p "require('$PACKAGE_JSON_PATH').version")
    - |
      if [ -z "$APP_VERSION" ] || [ "$APP_VERSION" = "undefined" ]; then
        echo "[ERREUR] Impossible de lire la version depuis package.json"
        exit 1
      fi
    - echo "[INFO] Version détectée depuis package.json  $APP_VERSION"
    # path_prefix utilise $APP_VERSION ; l'export pour la suite
    - echo "APP_VERSION=$APP_VERSION" >> deploy.env
    # === Vérification que le build existe ===
    - BUILD_DIR="$CI_PROJECT_DIR/opensankey/client/build"
    - |
      if [ ! -d "$BUILD_DIR" ]; then
        echo "[ERREUR] Le dossier build n'existe pas : $BUILD_DIR"
        echo "[INFO] Assurez-vous que le job 'build' s'est exécuté correctement."
        exit 1
      fi
    # === Chemins ===
    - JS_DIR="$BUILD_DIR/static/js"
    - CSS_DIR="$BUILD_DIR/static/css"
    - INDEX_FILE="$BUILD_DIR/index.html"
    # Avec path_prefix, public/ est la racine de CETTE version uniquement.
    - VERSION_DIR="$CI_PROJECT_DIR/public"
    # === Vérification des dossiers nécessaires ===
    - |
      if [ ! -d "$JS_DIR" ]; then
        echo "[ERREUR] Dossier JS introuvable : $JS_DIR"
        exit 1
      fi
      if [ ! -d "$CSS_DIR" ]; then
        echo "[ERREUR] Dossier CSS introuvable : $CSS_DIR"
        exit 1
      fi
      if [ ! -f "$INDEX_FILE" ]; then
        echo "[ERREUR] Fichier index.html introuvable : $INDEX_FILE"
        exit 1
      fi
    # === JS ===
    - |
      cd "$JS_DIR"
      js_found=false
      for f in main.*.js; do
        if [ -f "$f" ]; then
          cp "$f" "opensankey-v$APP_VERSION.js"
          echo "[INFO] JS renommé : $f → opensankey-v$APP_VERSION.js"
          sed -i "s|$f|opensankey-v$APP_VERSION.js|g" "$INDEX_FILE"
          js_found=true
        fi
      done
      if [ "$js_found" = false ]; then
        echo "[ATTENTION] Aucun fichier main.*.js trouvé"
      fi
    # === CSS ===
    - |
      cd "$CSS_DIR"
      css_found=false
      for f in main.*.css; do
        if [ -f "$f" ]; then
          cp "$f" "opensankey-v$APP_VERSION.css"
          echo "[INFO] CSS renommé : $f → opensankey-v$APP_VERSION.css"
          sed -i "s|$f|opensankey-v$APP_VERSION.css|g" "$INDEX_FILE"
          css_found=true
        fi
      done

      if [ "$css_found" = false ]; then
        echo "[ATTENTION] Aucun fichier main.*.css trouvé"
      fi
    # === Chemins relatifs pour GitLab Pages
    - sed -i 's|="/static/|="./static/|g' "$INDEX_FILE"
    - echo "[INFO] Chemins convertis en relatifs pour GitLab Pages"
    # === Préparation du dossier de déploiement (= public/, racine du path_prefix)
    - mkdir -p "$VERSION_DIR"
    - cp -r "$BUILD_DIR"/* "$VERSION_DIR"
    - echo '<meta http-equiv="refresh" content="0; url=/" />' > "$VERSION_DIR/404.html"
    - echo "[INFO] Version $APP_VERSION préparée dans $VERSION_DIR"
    # === Création du fichier static.zip ===
    - |
      if [ -d "$VERSION_DIR/static" ]; then
        cd "$VERSION_DIR"
        zip -r "static.zip" static/
        echo "[INFO] Fichier static.zip créé pour la version $APP_VERSION"
        echo "[INFO] Accessible à : https://su-model.gitlab.io/opensankey/$APP_VERSION/static.zip"
      else
        echo "[ATTENTION] Le dossier static n'existe pas dans $VERSION_DIR"
      fi
    - echo "[INFO] Déploiement versionné terminé pour $APP_VERSION"
  artifacts:
    paths:
      - public
    reports:
      dotenv: deploy.env
  dependencies:
    - build
  rules:
    - when: manual
      allow_failure: true

# =====================================================================
# Déploiement de la racine (latest + index listant toutes les versions)
# Ce job écrit à la racine de Pages (pas de path_prefix). Il interroge
# l'API GitLab pour lister tous les déploiements parallèles actifs et
# génère index.html dynamiquement.
#
# La page latest/ pointe vers la version qui vient d'être publiée par
# le job `pages` ci-dessus.
#
# Pour autoriser l'API : créer un Project Access Token (scope read_api)
# et l'exposer via une variable masquée PAGES_API_TOKEN. À défaut,
# le job tente CI_JOB_TOKEN (peut échouer selon perm projet).
# =====================================================================
pages-root:
  image: node:18
  stage: deploy
  variables:
    GIT_SUBMODULE_STRATEGY: none
  pages: true
  script:
    - apt-get update -qq && apt-get install -y -qq curl jq
    - PACKAGE_JSON_PATH="$CI_PROJECT_DIR/opensankey/client/package.json"
    - APP_VERSION=$(node -p "require('$PACKAGE_JSON_PATH').version")
    - echo "[INFO] Version courante  $APP_VERSION"
    - BUILD_DIR="$CI_PROJECT_DIR/opensankey/client/build"
    - LATEST_DIR="$CI_PROJECT_DIR/public/latest"
    # === latest/ = copie du build courant ===
    - mkdir -p "$LATEST_DIR"
    - cp -r "$BUILD_DIR"/* "$LATEST_DIR"
    - sed -i 's|="/static/|="./static/|g' "$LATEST_DIR/index.html"
    - echo '<meta http-equiv="refresh" content="0; url=/" />' > "$LATEST_DIR/404.html"
    - echo "[INFO] latest/ mis à jour avec $APP_VERSION"
    # === Liste des déploiements parallèles actifs ===
    - TOKEN="${PAGES_API_TOKEN:-$CI_JOB_TOKEN}"
    - API_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/pages/deployments?active=true&per_page=100"
    - echo "[INFO] Interrogation $API_URL"
    - |
      if curl --silent --show-error --fail \
           --header "PRIVATE-TOKEN: $TOKEN" \
           "$API_URL" > deployments.json; then
        echo "[INFO] Réponse API récupérée"
      else
        echo "[ATTENTION] API pages/deployments inaccessible — fallback liste vide"
        echo '[]' > deployments.json
      fi
    # Extraction des path_prefix uniques (les noms de version), tri SemVer desc.
    # Inclut $APP_VERSION même si l'API ne l'a pas encore retournée.
    - |
      jq -r '.[].path_prefix' deployments.json \
        | grep -v '^$' \
        | sort -u \
        > versions_raw.txt || true
      echo "$APP_VERSION" >> versions_raw.txt
      sort -u -V -r versions_raw.txt > versions.txt
      echo "[INFO] Versions à lister :"
      cat versions.txt
    # === Génération de l'index racine ===
    - |
      {
        echo '<!DOCTYPE html>'
        echo '<html lang="fr"><head><meta charset="utf-8">'
        echo '<title>OpenSankey - Versions</title>'
        echo '<style>'
        echo 'body { font-family: Arial, sans-serif; margin: 40px; max-width: 800px; }'
        echo 'h1 { color: #333; }'
        echo 'a { display: block; margin: 8px 0; padding: 10px; background: #f5f5f5; text-decoration: none; color: #333; border-radius: 4px; }'
        echo 'a:hover { background: #e0e0e0; }'
        echo '.latest { background: #e8f4fd; font-weight: bold; }'
        echo '.latest:hover { background: #d1e7ff; }'
        echo '.download { font-size: 0.9em; color: #555; }'
        echo '</style></head><body>'
        echo '<h1>OpenSankey — Versions disponibles</h1>'
        echo "<a class=\"latest\" href=\"./latest/\">🚀 Dernière version (latest = $APP_VERSION)</a>"
        echo '<h2>Toutes les versions</h2>'
        while IFS= read -r v; do
          [ -z "$v" ] && continue
          echo "<a href=\"./$v/\">📦 Version $v</a>"
          echo "<a class=\"download\" href=\"./$v/static.zip\">📥 static.zip (v$v)</a>"
        done < versions.txt
        echo '</body></html>'
      } > "$CI_PROJECT_DIR/public/index.html"
    - echo "[INFO] index.html racine généré"
  artifacts:
    paths:
      - public
  dependencies:
    - build
  needs:
    - job: pages
      artifacts: true
  rules:
    - when: manual
      allow_failure: true
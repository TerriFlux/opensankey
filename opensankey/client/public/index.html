<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="theme-color" content="#000000">
    <!--
      manifest.json provides metadata used when your web app is added to the
      homescreen on Android. See https://developers.google.com/web/fundamentals/engage-and-retain/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json">
    <link rel="shortcut icon" href="%PUBLIC_URL%/favicon.ico">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>Open-Sankey</title>
  </head>
  <body>
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <script>
      window.SankeyToolsStatic = {{static_site}}
      if (window.SankeyToolsStatic ) {
        window.sankey = {}
        window.sankey.sankey_data_file = "{{url_for('flaskfilemanager.userfile', filename=filename)}}"
        window.sankey.excel = "{{excel}}"
        window.sankey.flask_header = "{{header}}"
        window.sankey.flask_logo = "{{url_for('flaskfilemanager.userfile', filename=logo)}}" 
        window.sankey.logo_width = "{{logo_width}}" 
        window.sankey.legend_average = "{{legend_average}}"
        window.sankey.legend_uncert = "{{legend_uncert}}"
        {% if help_text is defined %}            
          window.sankey.help_text = "{{help_text|safe}}"
        {% endif  %}
        {% if welcome_text is defined %}            
          window.sankey.welcome_text = "{{welcome_text|safe}}"
        {% endif  %}
        {% if sous_filieres is defined %}     
          window.sankey.sous_filieres = {{sous_filieres|safe}}
        {% endif  %}
        {% if units is defined %}   
          window.sankey.units = {{units|safe}}
        {% endif  %}        
      }
    </script>
    <div id="react-container"></div>
  </body>

</html>
